name: CI

# Runs on every PR (any base branch) and on every push to main.
# Same-branch pushes cancel the prior run so reviewers see only the
# latest CI status.
on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, Lint, Test, Migrate-Sweep
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Tests + migration sweep both honor TEST_DATABASE_URL.
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
      NODE_ENV: test
      # Force-disable Next.js telemetry in CI.
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "Postgres ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Postgres failed to come up within 30s"
          exit 1

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test (with coverage gate on lib/operations/*)
        run: npm run ci:test

      - name: Migration sweep — 003..007 idempotency
        run: npm run ci:migrate-sweep

      - name: npm audit (non-blocking, high+)
        # Visible in logs but does NOT fail the job. Remove the || true
        # once the audit feedback loop is clean.
        run: npm audit --audit-level=high || true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload test results (JUnit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit
          path: junit.xml
          if-no-files-found: warn
          retention-days: 14
